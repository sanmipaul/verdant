[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
celo      = "https://forno.celo.org"
alfajores = "https://alfajores-forno.celo-testnet.org"

[etherscan]
celo      = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }
alfajores = { key = "${CELOSCAN_API_KEY}", url = "https://api-alfajores.celoscan.io/api" }
